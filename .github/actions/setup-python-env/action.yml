name: Setup Python Environment
description: Install Python and uv, then sync dependencies.
inputs:
  python-version:
    description: Python version to install.
    required: false
    default: "3.12"
  uv-sync-args:
    description: Arguments passed to uv sync.
    required: false
    default: "--locked"
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install dependencies
      shell: bash
      run: uv sync ${{ inputs.uv-sync-args }}
