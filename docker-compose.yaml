services:
  init-perms:
    image: alpine:3.20
    container_name: mywebsite-init-perms
    user: "0:0"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/uploads
    restart: "no"
    command: >
      sh -lc "
        set -e;
        mkdir -p /app/staticfiles /app/uploads;
        chown -R 1000:1000 /app/staticfiles /app/uploads
      "

  web:
    build: .
    container_name: mywebsite
    user: "1000:1000"
    env_file: .env
    environment:
      PGSERVICEFILE: /home/appuser/.pg_service.conf
      PASSFILE: /home/appuser/.website_pgpass
    depends_on:
      db:
        condition: service_started
      init-perms:
        condition: service_completed_successfully
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/uploads
      - ./.pg_service.conf:/home/appuser/.pg_service.conf:ro
      - ./.website_pgpass:/home/appuser/.website_pgpass:ro
    restart: unless-stopped
    command: >
      sh -c "
        uv run manage.py migrate &&
        uv run manage.py collectstatic --noinput &&
        uv run gunicorn website.wsgi:application --bind 0.0.0.0:8000
      "

  db:
    image: postgres:17
    secrets:
      - db_password
    env_file: .env
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/uploads
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - web
    networks:
      - default

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM; while :; do 
        sleep 12h & wait $${!}; 
        certbot renew --webroot --webroot-path=/var/www/certbot;
      done"
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  default:
    name: idachserblog_default

secrets:
  db_password:
    file: ./secrets/db_password
